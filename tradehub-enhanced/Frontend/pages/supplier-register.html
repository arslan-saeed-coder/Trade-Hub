<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join as Supplier — TradeHub PK</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
.reg-page{min-height:100vh;background:var(--gray-50);padding:56px 28px;}
.reg-container{max-width:620px;margin:0 auto;}
.reg-card{background:white;border-radius:var(--radius-xl);padding:44px;box-shadow:var(--shadow-lg);border:1.5px solid var(--gray-200);}
.reg-header{text-align:center;margin-bottom:36px;}
.reg-header .logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gray-900);text-decoration:none;}
.reg-header .logo span{color:var(--green);}
.reg-header h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-top:24px;letter-spacing:-.4px;}
.reg-header p{color:var(--gray-500);margin-top:8px;line-height:1.6;}
.section-title{font-size:.8rem;font-weight:700;color:var(--gray-400);margin:28px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--gray-200);text-transform:uppercase;letter-spacing:.7px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.perks{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.perk{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--gray-700);background:var(--gray-50);padding:10px 14px;border-radius:10px;border:1px solid var(--gray-200);}
.perk span:first-child{font-size:1rem;}
@media(max-width:480px){.two-col,.perks{grid-template-columns:1fr;}.reg-card{padding:28px 22px;}}
</style>
</head>
<body>
<div id="scroll-progress"></div>
<div class="reg-page">
  <div class="reg-container">
    <div class="reg-card">
      <div class="reg-header">
        <a href="../index.html" class="logo">Trade<span>Hub</span> PK</a>
        <h2>Join as a Verified Supplier</h2>
        <p>List your business for free and reach thousands of buyers across Pakistan</p>
      </div>
      <div class="perks">
        <div class="perk"><span>✅</span> Free to join</div>
        <div class="perk"><span>📦</span> Unlimited products</div>
        <div class="perk"><span>💬</span> Direct inquiries</div>
        <div class="perk"><span>🏅</span> Verified badge</div>
      </div>
      <div class="section-title">Business Information</div>
      <div class="form-group"><label>Business / Company Name *</label><input type="text" id="bizName" placeholder="Al-Hamza Trading Co."></div>
      <div class="two-col">
        <div class="form-group"><label>Category *</label><select id="bizCat"><option value="">Select category</option><option>Textiles</option><option>Electronics</option><option>Agriculture</option><option>Hardware</option><option>Food &amp; Grain</option><option>Sports</option><option>Leather</option><option>Chemicals</option><option>Construction</option><option>Other</option></select></div>
        <div class="form-group"><label>City *</label><select id="bizCity"><option value="">Select city</option><option>Lahore</option><option>Karachi</option><option>Faisalabad</option><option>Sialkot</option><option>Multan</option><option>Rawalpindi</option><option>Gujranwala</option><option>Other</option></select></div>
      </div>
      <div class="form-group"><label>Business Address</label><input type="text" id="bizAddr" placeholder="Street, Area, City"></div>
      <div class="form-group"><label>Minimum Order Quantity (MOQ)</label><input type="text" id="bizMoq" placeholder="e.g. 500 meters, 100 kg"></div>
      <div class="section-title">Contact Details</div>
      <div class="two-col">
        <div class="form-group"><label>Contact Person *</label><input type="text" id="contName" placeholder="Muhammad Ali"></div>
        <div class="form-group"><label>WhatsApp Number *</label><input type="tel" id="contWa" placeholder="03001234567"></div>
      </div>
      <div class="two-col">
        <div class="form-group"><label>Email Address *</label><input type="email" id="contEmail" placeholder="info@company.pk"></div>
        <div class="form-group"><label>Website (optional)</label><input type="url" id="contWeb" placeholder="https://company.pk"></div>
      </div>
      <div class="section-title">Account Setup</div>
      <div class="form-group"><label>Password *</label><input type="password" id="supPass" placeholder="Min 8 characters"></div>
      <div class="form-group"><label>Confirm Password *</label><input type="password" id="supPass2" placeholder="Repeat password"></div>
      <button class="btn-submit" onclick="registerSupplier()" style="margin-top:10px">Submit Registration</button>
      <p style="text-align:center;margin-top:16px;font-size:.85rem;color:var(--gray-500)">Already registered? <a href="supplier-dashboard.html" style="color:var(--green);font-weight:600">Go to Dashboard →</a></p>
    </div>
  </div>
</div>
<div class="toast-stack" id="toastStack"></div>
<script>
function registerSupplier(){
  const fields=["bizName","bizCat","bizCity","contName","contWa","contEmail","supPass","supPass2"];
  const labels=["Business Name","Category","City","Contact Person","WhatsApp","Email","Password","Confirm Password"];
  for(let i=0;i<fields.length;i++){if(!document.getElementById(fields[i]).value.trim()){showToast(`Please fill: ${labels[i]}`,"error");return;}}
  if(document.getElementById("supPass").value!==document.getElementById("supPass2").value){showToast("Passwords do not match.","error");return;}
  const supplier={bizName:document.getElementById("bizName").value,category:document.getElementById("bizCat").value,city:document.getElementById("bizCity").value,moq:document.getElementById("bizMoq").value,name:document.getElementById("contName").value,wa:document.getElementById("contWa").value,email:document.getElementById("contEmail").value,web:document.getElementById("contWeb").value,products:[],status:"pending"};
  localStorage.setItem("th_supplier",JSON.stringify(supplier));
  localStorage.setItem("th_supplier_session",JSON.stringify(supplier));
  showToast("Registration submitted! Redirecting to dashboard…","success");
  setTimeout(()=>window.location.href="supplier-dashboard.html",1800);
}
function showToast(msg,type="success"){const stack=document.getElementById("toastStack");const t=document.createElement("div");t.className=`toast toast-${type}`;t.textContent=msg;stack.appendChild(t);setTimeout(()=>t.remove(),3100);}
</script>
<script src="../js/config.js"></script><script src="../js/api.js"></script>
</body>
</html>
