<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Categories — My Store</title><link rel="stylesheet" href="../css/main.css"></head><body><nav class="navbar"><div class="nav-container"><a href="../index.html" class="logo">My<span>Store</span></a><ul class="nav-links"><li><a href="products.html">Products</a></li><li><a href="categories.html">Categories</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul><div class="nav-actions"><a href="#" class="btn-login" onclick="openModal('login');return false;">Login</a><a href="#" class="btn-register" onclick="openModal('register');return false;">Register</a></div></div></nav><div class="page-header store-header"><div class="ph-inner"><span class="eyebrow">Store Departments</span><h1>Categories</h1><p>Browse product categories managed only by My Store.</p></div></div><main class="products-page"><div class="categories-grid" id="catGrid"><div class="loading-card">Loading categories…</div></div></main><footer class="footer"><div class="footer-inner"><div class="footer-bottom"><p>© 2026 My Store.</p></div></div></footer><div class="toast-stack" id="toastStack"></div><script src="../js/config.js"></script><script src="../js/api.js"></script><script src="../js/shared-auth.js"></script><script src="../js/nav.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{try{const cats=await Categories.list();catGrid.innerHTML=cats.map(c=>`<a href="products.html?cat=${encodeURIComponent(c)}" class="cat-card"><span class="cat-icon">🛍️</span><div class="cat-name">${c}</div><div class="cat-count">View products</div></a>`).join('')||'<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No categories yet</div></div>';}catch(e){catGrid.innerHTML='<p>Unable to load categories.</p>';}});</script></body></html>
