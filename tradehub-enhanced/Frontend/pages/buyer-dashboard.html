<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Orders — My Store</title><link rel="stylesheet" href="../css/main.css"></head><body><nav class="navbar"><div class="nav-container"><a href="../index.html" class="logo">My<span>Store</span></a><ul class="nav-links"><li><a href="products.html">Products</a></li></ul><div class="nav-actions"><a href="#" class="btn-login" onclick="openModal('login');return false;">Login</a></div></div></nav><div class="page-header"><div class="ph-inner"><h1>My Orders</h1><p>Customer order history.</p></div></div><div class="products-page"><div class="table-card" style="background:white;border-radius:18px;padding:20px"><table class="admin-table" style="width:100%"><thead><tr><th>Order ID</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody id="ordersBody"></tbody></table></div></div><script src="../js/config.js"></script><script src="../js/api.js"></script><script src="../js/shared-auth.js"></script><script>function money(n){return Number(n||0).toLocaleString('en-PK')}document.addEventListener('DOMContentLoaded',async()=>{if(!Auth.getSession()){openModal('login');return;}try{const orders=await Orders.list();ordersBody.innerHTML=orders.map(o=>`<tr><td>${o.order_id}</td><td>${o.product_name}</td><td>${o.quantity}</td><td>PKR ${money(o.total_price)}</td><td>${o.order_status}</td><td>${new Date(o.created_at).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="6">No orders yet.</td></tr>';}catch(e){showToast(e.message,'error')}})</script></body></html>
