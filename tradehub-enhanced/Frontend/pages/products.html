<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — My Store</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
.sold-by{font-size:.78rem;color:var(--gray-500);margin:2px 0 10px;}
.sold-by strong{color:var(--gray-700);}
.sold-by .badge-verified{color:var(--green);font-weight:700;}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.qty-row button{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gray-200);background:white;font-weight:800;cursor:pointer;font-size:1rem;}
.qty-row input{width:64px;text-align:center;padding:8px;border:1.5px solid var(--gray-200);border-radius:8px;font-weight:700;}
.order-total{font-weight:800;font-size:1.05rem;margin-bottom:16px;color:var(--gray-900);}
.order-total span{color:var(--green);}
</style>
</head>
<body>
<div id="scroll-progress"></div>
<button id="back-to-top" aria-label="Back to top">↑</button>

<nav class="navbar" id="mainNav">
  <div class="nav-container">
    <a href="../index.html" class="logo">My<span>Store</span></a>
    <ul class="nav-links">
      <li><a href="products.html" class="active-nav">Products</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="#" class="btn-login" onclick="openModal('login');return false;">Login</a>
      <a href="#" class="btn-register" onclick="openModal('register');return false;">Register</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile-menu" id="navMobileMenu">
    <a href="products.html">Products</a>
    <a href="categories.html">Categories</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <div class="mobile-actions">
      <a href="#" class="btn-login" style="flex:1;text-align:center;" onclick="openModal('login');return false;">Login</a>
      <a href="#" class="btn-register" style="flex:1;text-align:center;" onclick="openModal('register');return false;">Register</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="ph-inner">
    <h1>Our Products</h1>
    <p>Quality products, sold directly by us</p>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-inner">
    <input type="text" class="filter-search" id="searchFilter" placeholder="Search products…" oninput="loadProducts()">
    <select class="filter-select" id="catFilter" onchange="loadProducts()">
      <option value="">All Categories</option>
    </select>
    <select class="filter-select" id="sortFilter" onchange="renderProducts()">
      <option value="">Sort: Default</option>
      <option value="name">Name A-Z</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
    </select>
    <span class="results-count" id="resultsCount">Loading…</span>
  </div>
</div>

<div class="products-page">
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Order Modal -->
<div class="inq-modal" id="orderModal">
  <div class="inq-box">
    <h3>Complete Your Order</h3>
    <p style="font-size:.875rem;color:var(--gray-500);margin-bottom:8px">Product: <strong id="ordProductName"></strong></p>
    <div class="qty-row">
      <button type="button" onclick="changeQty(-1)">−</button>
      <input type="number" id="ordQty" value="1" min="1" oninput="updateOrderTotal()">
      <button type="button" onclick="changeQty(1)">+</button>
    </div>
    <div class="order-total">Total: <span id="ordTotal">PKR 0</span></div>
    <div class="form-group"><label>Full Name *</label><input type="text" id="ordName" placeholder="Muhammad Ali"></div>
    <div class="form-group"><label>Phone Number *</label><input type="tel" id="ordPhone" placeholder="03001234567"></div>
    <div class="form-group"><label>Email (optional)</label><input type="email" id="ordEmail" placeholder="you@example.com"></div>
    <div class="form-group"><label>Delivery Address *</label><input type="text" id="ordAddress" placeholder="House / Street, Area"></div>
    <div class="form-group"><label>City *</label><input type="text" id="ordCity" placeholder="Lahore"></div>
    <div class="form-group"><label>Order Notes (optional)</label><textarea id="ordNotes" rows="2" placeholder="Any special instructions…"></textarea></div>
    <button class="btn-submit" id="ordSubmitBtn" onclick="submitOrder()">Place Order</button>
    <button onclick="closeOrder()" style="width:100%;margin-top:10px;padding:12px;border:none;background:none;color:var(--gray-500);cursor:pointer;font-weight:600;border-radius:11px;transition:background .2s" onmouseover="this.style.background='var(--gray-100)'" onmouseout="this.style.background='none'">Cancel</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/shared-auth.js"></script>
<script>
let ALL_PRODUCTS = [];
let currentProduct = null;

async function loadCategories(){
  try {
    const cats = await Categories.list();
    const sel = document.getElementById('catFilter');
    sel.innerHTML = '<option value="">All Categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat');
    if (cat && cats.some(c=>c.toLowerCase()===cat.toLowerCase())) sel.value = cats.find(c=>c.toLowerCase()===cat.toLowerCase());
  } catch(e){ /* categories are optional */ }
}

async function loadProducts(){
  const grid = document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent = 'Loading…';
  const search = document.getElementById('searchFilter').value.trim();
  const category = document.getElementById('catFilter').value;
  try {
    const data = await Products.list({ search, category, limit: 100 });
    ALL_PRODUCTS = data.products;
    renderProducts();
  } catch(err){
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load products</div><div class="empty-text">${err.message}</div></div>`;
    document.getElementById('resultsCount').textContent = '';
  }
}

function renderProducts(){
  const grid = document.getElementById('productsGrid');
  const sort = document.getElementById('sortFilter').value;
  let list = [...ALL_PRODUCTS];
  if (sort === 'name') list.sort((a,b)=>a.name.localeCompare(b.name));
  if (sort === 'price-low') list.sort((a,b)=>a.price-b.price);
  if (sort === 'price-high') list.sort((a,b)=>b.price-a.price);
  document.getElementById('resultsCount').textContent = `Showing ${list.length} products`;
  if (!list.length){
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No products found</div><div class="empty-text">Try adjusting your filters or search terms.</div></div>`;
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-img">${p.image ? `<img src="${p.image}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">` : '📦'}</div>
      <div class="product-body">
        <div class="product-price">PKR ${p.price.toLocaleString()}</div>
        <div class="product-name">${p.name}</div>
        <div class="sold-by">Sold by: <strong>My Store</strong> · <span class="badge-verified">✅ Verified Seller</span></div>
        <div class="product-moq">${p.stock_status === 'available' ? 'In Stock' : 'Out of Stock'}</div>
        <button class="btn-inquiry" onclick='openOrder(${JSON.stringify(p).replace(/'/g,"&#39;")})' ${p.stock_status !== 'available' ? 'disabled style="opacity:.5;cursor:not-allowed"' : ''}>Buy Now</button>
      </div>
    </div>
  `).join('');
  setTimeout(()=>{
    grid.querySelectorAll('.product-card').forEach((c,i)=>{
      c.style.opacity='0'; c.style.transform='translateY(14px)';
      c.style.transition=`opacity .3s ease ${i*.05}s, transform .3s ease ${i*.05}s`;
      setTimeout(()=>{ c.style.opacity='1'; c.style.transform='translateY(0)'; }, 20+i*50);
    });
  },10);
}

function changeQty(delta){
  const input = document.getElementById('ordQty');
  let v = Math.max(1, (parseInt(input.value)||1) + delta);
  input.value = v;
  updateOrderTotal();
}
function updateOrderTotal(){
  if (!currentProduct) return;
  const qty = Math.max(1, parseInt(document.getElementById('ordQty').value)||1);
  document.getElementById('ordTotal').textContent = `PKR ${(currentProduct.price*qty).toLocaleString()}`;
}
function openOrder(product){
  currentProduct = product;
  document.getElementById('ordProductName').textContent = product.name;
  document.getElementById('ordQty').value = 1;
  updateOrderTotal();
  const session = typeof Auth !== 'undefined' ? Auth.getSession() : null;
  if (session){
    document.getElementById('ordName').value = session.name || '';
    document.getElementById('ordEmail').value = session.email || '';
    document.getElementById('ordPhone').value = session.phone || '';
  }
  document.getElementById('orderModal').classList.add('show');
}
function closeOrder(){ document.getElementById('orderModal').classList.remove('show'); }

async function submitOrder(){
  const name = document.getElementById('ordName').value.trim();
  const phone = document.getElementById('ordPhone').value.trim();
  const email = document.getElementById('ordEmail').value.trim();
  const address = document.getElementById('ordAddress').value.trim();
  const city = document.getElementById('ordCity').value.trim();
  const notes = document.getElementById('ordNotes').value.trim();
  const qty = Math.max(1, parseInt(document.getElementById('ordQty').value)||1);

  if (!name || !phone || !address || !city){
    showToast('Please fill in all required fields.', 'error');
    return;
  }

  const btn = document.getElementById('ordSubmitBtn');
  btn.textContent = 'Placing order…'; btn.disabled = true;
  try {
    const order = await Orders.create({
      product_id: currentProduct.id,
      quantity: qty,
      customer_name: name,
      phone,
      email: email || null,
      address,
      city,
      notes: notes || null,
    });
    closeOrder();
    showToast(`Order ${order.order_number} placed! Redirecting to WhatsApp…`, 'success');
    setTimeout(() => { window.open(buildWhatsAppOrderUrl(order), '_blank'); }, 900);
  } catch(err){
    showToast(err.message || 'Could not place order.', 'error');
  } finally {
    btn.textContent = 'Place Order'; btn.disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) document.getElementById('searchFilter').value = q;
  loadCategories().then(loadProducts);
  document.getElementById('orderModal').addEventListener('click', function(e){ if (e.target===this) closeOrder(); });
});
</script>
<script src="../js/nav.js"></script>
</body>
</html>
