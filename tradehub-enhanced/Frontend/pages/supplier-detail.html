<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Profile — TradeHub PK</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
.page-header {
  background: linear-gradient(135deg,#064e3b,#065f46);
  padding: 40px 24px; color: white;
}
.page-header .container { max-width: 1000px; margin: 0 auto; }
.supplier-hero {
  display: flex; align-items: center; gap: 24px;
  flex-wrap: wrap;
}
.supplier-hero-logo {
  width: 80px; height: 80px; border-radius: 20px;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 900; color: white;
  border: 2px solid rgba(255,255,255,.2);
  flex-shrink: 0;
}
.supplier-hero-info h1 { font-size: 1.8rem; font-weight: 900; }
.supplier-hero-info .verified {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.15); color: #a7f3d0;
  font-size: .8rem; font-weight: 700;
  padding: 4px 12px; border-radius: 100px;
  margin-top: 8px;
}
.supplier-hero-actions { margin-left: auto; display: flex; gap: 10px; flex-shrink: 0; }
.btn-wa-lg {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 20px; border-radius: 10px;
  background: #25D366; color: white;
  font-weight: 700; font-size: .9rem;
  text-decoration: none; transition: opacity .2s;
}
.btn-wa-lg:hover { opacity: .88; }
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 20px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,.3);
  color: white; font-weight: 600; font-size: .875rem;
  text-decoration: none; transition: border-color .2s;
}
.btn-back:hover { border-color: white; }

.detail-layout {
  max-width: 1000px; margin: 40px auto; padding: 0 24px;
  display: grid; grid-template-columns: 1fr 320px; gap: 24px;
}
.detail-card {
  background: white; border-radius: 16px;
  border: 1.5px solid var(--gray-200); padding: 28px;
  margin-bottom: 20px;
}
.detail-card h3 {
  font-size: 1rem; font-weight: 800; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid var(--gray-200);
}
.info-row {
  display: flex; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--gray-100);
  font-size: .875rem;
}
.info-row:last-child { border-bottom: none; padding-bottom: 0; }
.info-label { color: var(--gray-500); font-weight: 600; min-width: 130px; flex-shrink: 0; }
.info-val { color: var(--gray-900); font-weight: 500; }
.products-list {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.mini-product {
  background: var(--gray-50); border-radius: 12px;
  padding: 16px; border: 1.5px solid var(--gray-200);
  transition: all .2s;
}
.mini-product:hover { border-color: var(--green); }
.mini-product-emoji { font-size: 1.8rem; margin-bottom: 8px; }
.mini-product-name { font-weight: 700; font-size: .85rem; margin-bottom: 4px; }
.mini-product-price { color: var(--green); font-weight: 800; font-size: .9rem; }
.mini-product-moq { font-size: .75rem; color: var(--gray-500); margin-top: 4px; }
.btn-mini-inq {
  width: 100%; margin-top: 10px; padding: 8px;
  background: var(--green); color: white;
  border: none; border-radius: 8px;
  font-size: .78rem; font-weight: 700; cursor: pointer;
  transition: background .2s;
}
.btn-mini-inq:hover { background: var(--green-dark); }

/* Sidebar sticky card */
.sidebar-card {
  background: white; border-radius: 16px;
  border: 1.5px solid var(--gray-200); padding: 24px;
  position: sticky; top: 84px;
}
.sidebar-card h4 { font-weight: 800; font-size: .95rem; margin-bottom: 16px; }
.contact-btn-stack { display: flex; flex-direction: column; gap: 10px; }
.btn-contact-full {
  display: block; text-align: center;
  padding: 12px; border-radius: 10px;
  font-weight: 700; font-size: .875rem;
  text-decoration: none; transition: all .2s; cursor: pointer;
  border: none; font-family: 'Inter', sans-serif;
}
.btn-contact-full.green { background: var(--green); color: white; }
.btn-contact-full.green:hover { background: var(--green-dark); }
.btn-contact-full.wa { background: #25D366; color: white; }
.btn-contact-full.wa:hover { opacity: .88; }
.btn-contact-full.outline {
  background: transparent; color: var(--gray-700);
  border: 1.5px solid var(--gray-200);
}
.btn-contact-full.outline:hover { border-color: var(--green); color: var(--green); }
.stat-pill-row {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 20px; padding-top: 20px;
  border-top: 1px solid var(--gray-200);
}
.stat-pill {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .8rem;
}
.stat-pill-label { color: var(--gray-500); }
.stat-pill-val { font-weight: 700; color: var(--gray-900); }
.badge-verified { color: var(--green); }
.badge-pending { color: var(--gray-400); }

/* Inquiry modal */
.inq-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  z-index: 1000; align-items: center; justify-content: center;
}
.inq-modal.show { display: flex; }
.inq-box {
  background: white; border-radius: 20px;
  padding: 36px; max-width: 440px; width: 90%;
  animation: popIn .25s ease-out;
}
@keyframes popIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.inq-box h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
.inq-box .sub { font-size: .85rem; color: var(--gray-500); margin-bottom: 20px; }

@media(max-width:768px){
  .detail-layout { grid-template-columns: 1fr; }
  .sidebar-card { position: static; }
  .supplier-hero { flex-direction: column; align-items: flex-start; }
  .supplier-hero-actions { margin-left: 0; }
  .products-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="scroll-progress"></div>
<button id="back-to-top" aria-label="Back to top">↑</button>

<nav class="navbar">
  <div class="nav-container">
    <a href="../index.html" class="logo">Trade<span>Hub</span> PK</a>
    <ul class="nav-links">
      <li><a href="suppliers.html" style="color:var(--green)">Suppliers</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-actions">
      <a href="#" class="btn-login" onclick="openModal('login');return false;">Login</a>
      <a href="supplier-register.html" class="btn-register">Join as Supplier</a>
    </div>
  </div>
</nav>

<!-- HERO — populated by JS -->
<div class="page-header">
  <div class="container">
    <div class="supplier-hero" id="supplierHero">
      <div style="color:rgba(255,255,255,.5);font-size:.9rem">Loading supplier...</div>
    </div>
  </div>
</div>

<!-- DETAIL LAYOUT -->
<div class="detail-layout">
  <div>
    <!-- Company Info -->
    <div class="detail-card" id="cardInfo"></div>
    <!-- Products -->
    <div class="detail-card" id="cardProducts"></div>
  </div>
  <!-- Sidebar -->
  <div>
    <div class="sidebar-card" id="sidebarCard"></div>
  </div>
</div>

<!-- INQUIRY MODAL -->
<div class="inq-modal" id="inqModal">
  <div class="inq-box">
    <h3>Send Inquiry</h3>
    <p class="sub">Sending for: <strong id="inqTarget"></strong></p>
    <div class="form-group">
      <label>Your Name *</label>
      <input type="text" id="inqName" placeholder="Muhammad Ali">
    </div>
    <div class="form-group">
      <label>Phone / WhatsApp *</label>
      <input type="tel" id="inqPhone" placeholder="03001234567">
    </div>
    <div class="form-group">
      <label>Quantity Required *</label>
      <input type="text" id="inqQty" placeholder="e.g. 5 Ton or 200 pieces">
    </div>
    <div class="form-group">
      <label>Message (optional)</label>
      <textarea id="inqMsg" rows="3" placeholder="Any specific requirements..."></textarea>
    </div>
    <button class="btn-submit" onclick="submitInquiry()">Send Inquiry</button>
    <button onclick="closeInquiry()" style="width:100%;margin-top:10px;padding:12px;border:none;background:none;color:var(--gray-500);cursor:pointer;font-weight:600">Cancel</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/shared-auth.js"></script>
<script>
const ALL_SUPPLIERS = [
  { id:1, name:'Al-Hamza Textiles', initial:'AH', category:'Textiles', location:'Faisalabad', moq:'500 meters', wa:'923001234567', verified:true,
    desc:'Leading textile manufacturer in Faisalabad with 15+ years of experience. Specializing in cotton and polyester fabrics for domestic and export markets.',
    estYear:'2009', employees:'50–200', exportStatus:'Export Ready',
    products:[
      {name:'Cotton Fabric Plain Weave',emoji:'👕',price:'PKR 180/m',moq:'Min 500 m'},
      {name:'Polyester Yarn 30/1',emoji:'🧵',price:'PKR 950/kg',moq:'Min 1 Ton'},
      {name:'Denim Fabric',emoji:'👖',price:'PKR 340/m',moq:'Min 200 m'},
      {name:'Blended Fabric',emoji:'🎽',price:'PKR 220/m',moq:'Min 300 m'},
    ]
  },
  { id:2, name:'Pak Steel Works', initial:'PS', category:'Hardware', location:'Lahore', moq:'100 kg', wa:'923011234567', verified:true,
    desc:'Premium steel and hardware supplier in Lahore. Supplying construction, manufacturing, and industrial clients across Punjab.',
    estYear:'2005', employees:'100–500', exportStatus:'Domestic',
    products:[
      {name:'MS Steel Bars 12mm',emoji:'🔩',price:'PKR 1,950/kg',moq:'Min 100 kg'},
      {name:'PVC Pipe 2-inch',emoji:'🔧',price:'PKR 850/length',moq:'Min 200 pcs'},
      {name:'Steel Angle Bar',emoji:'⚙️',price:'PKR 1,750/kg',moq:'Min 50 kg'},
      {name:'GI Pipe 1.5-inch',emoji:'🪛',price:'PKR 620/length',moq:'Min 100 pcs'},
    ]
  },
  { id:3, name:'Green Farm Exports', initial:'GF', category:'Agriculture', location:'Multan', moq:'1 Ton', wa:'923021234567', verified:true,
    desc:'Agricultural export house from Multan with strong roots in mangoes, wheat, and rice. Serving buyers across Pakistan and internationally.',
    estYear:'2012', employees:'20–50', exportStatus:'Export Ready',
    products:[
      {name:'Wheat Flour Grade A',emoji:'🌾',price:'PKR 1,100/40kg',moq:'Min 1 Ton'},
      {name:'Mango Sindhri Export',emoji:'🥭',price:'PKR 280/kg',moq:'Min 500 kg'},
      {name:'Basmati Rice Super',emoji:'🍚',price:'PKR 3,100/50kg',moq:'Min 2 Ton'},
    ]
  },
  { id:4, name:'Sialkot Sports Co.', initial:'SS', category:'Sports', location:'Sialkot', moq:'50 pcs', wa:'923031234567', verified:true,
    desc:'World-class sports goods manufacturer in Sialkot. Exporting to Europe, North America, and Middle East. FIFA-approved football supplier.',
    estYear:'1998', employees:'200–500', exportStatus:'Export Ready',
    products:[
      {name:'Football Match Grade',emoji:'⚽',price:'PKR 450/piece',moq:'Min 50 pcs'},
      {name:'Cricket Bat English Willow',emoji:'🏏',price:'PKR 2,200/piece',moq:'Min 20 pcs'},
      {name:'Hockey Stick Pro',emoji:'🏑',price:'PKR 1,800/piece',moq:'Min 30 pcs'},
    ]
  },
  { id:5, name:'Karachi Leather House', initial:'KL', category:'Leather', location:'Karachi', moq:'200 pcs', wa:'923041234567', verified:false,
    desc:'Handmade leather goods manufacturer based in Karachi. Specializing in wallets, belts, and bags for wholesale buyers.',
    estYear:'2016', employees:'10–50', exportStatus:'Domestic',
    products:[
      {name:'Leather Wallet Handmade',emoji:'👜',price:'PKR 320/piece',moq:'Min 200 pcs'},
      {name:'Leather Belt Classic',emoji:'🪢',price:'PKR 280/piece',moq:'Min 100 pcs'},
    ]
  },
  { id:6, name:'Punjab Rice Mills', initial:'PR', category:'Food & Grain', location:'Sheikhupura', moq:'5 Ton', wa:'923051234567', verified:true,
    desc:'Premium rice milling and packaging in Sheikhupura. Supplying basmati and super kernel rice to retailers and exporters nationwide.',
    estYear:'2000', employees:'50–200', exportStatus:'Export Ready',
    products:[
      {name:'Basmati Rice Premium',emoji:'🍚',price:'PKR 2,800/50kg',moq:'Min 5 Ton'},
      {name:'Super Kernel Rice',emoji:'🌾',price:'PKR 2,400/50kg',moq:'Min 3 Ton'},
    ]
  },
  { id:7, name:'Lahore Electronics Hub', initial:'LE', category:'Electronics', location:'Lahore', moq:'10 units', wa:'923061234567', verified:true,
    desc:'Electronics distributor and wholesaler in Lahore. Stocking mobile accessories, LED components, and consumer electronics for retailers.',
    estYear:'2018', employees:'10–50', exportStatus:'Domestic',
    products:[
      {name:'LED Strip Lights 5m',emoji:'💡',price:'PKR 850/roll',moq:'Min 20 rolls'},
      {name:'Phone Charger 65W USB-C',emoji:'🔌',price:'PKR 1,200/piece',moq:'Min 50 pcs'},
      {name:'Power Bank 20000mAh',emoji:'🔋',price:'PKR 2,800/piece',moq:'Min 10 pcs'},
    ]
  },
  { id:8, name:'Rawalpindi Chemicals', initial:'RC', category:'Chemicals', location:'Rawalpindi', moq:'50 kg', wa:'923071234567', verified:false,
    desc:'Industrial chemicals distributor serving Rawalpindi and Islamabad. Supplies cleaning agents, solvents, and industrial chemicals.',
    estYear:'2014', employees:'10–50', exportStatus:'Domestic',
    products:[
      {name:'Caustic Soda Flakes',emoji:'🧪',price:'PKR 180/kg',moq:'Min 50 kg'},
      {name:'Sodium Bicarbonate',emoji:'⚗️',price:'PKR 120/kg',moq:'Min 25 kg'},
    ]
  },
];

let currentSupplier = null;
let inqTarget = '';

function getIdFromUrl() {
  return parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
}

function renderPage(s) {
  document.title = `${s.name} — TradeHub PK`;

  // Hero
  document.getElementById('supplierHero').innerHTML = `
    <div class="supplier-hero-logo">${s.initial}</div>
    <div class="supplier-hero-info">
      <h1>${s.name}</h1>
      <div style="color:#a7f3d0;font-size:.875rem;margin-top:6px">📍 ${s.location} &nbsp;•&nbsp; ${s.category}</div>
      <div class="verified">${s.verified ? '✅ Verified Supplier' : '⏳ Verification Pending'}</div>
    </div>
    <div class="supplier-hero-actions">
      <a href="suppliers.html" class="btn-back">← Back</a>
      <a href="https://wa.me/${s.wa}" target="_blank" class="btn-wa-lg">💬 WhatsApp</a>
    </div>
  `;

  // Info card
  document.getElementById('cardInfo').innerHTML = `
    <h3>Company Information</h3>
    <div class="info-row"><span class="info-label">Business Name</span><span class="info-val">${s.name}</span></div>
    <div class="info-row"><span class="info-label">Category</span><span class="info-val">${s.category}</span></div>
    <div class="info-row"><span class="info-label">Location</span><span class="info-val">📍 ${s.location}, Pakistan</span></div>
    <div class="info-row"><span class="info-label">Min. Order (MOQ)</span><span class="info-val">📦 ${s.moq}</span></div>
    <div class="info-row"><span class="info-label">Established</span><span class="info-val">${s.estYear}</span></div>
    <div class="info-row"><span class="info-label">Team Size</span><span class="info-val">${s.employees} employees</span></div>
    <div class="info-row"><span class="info-label">Export Status</span><span class="info-val">${s.exportStatus}</span></div>
    <div class="info-row"><span class="info-label">Verification</span><span class="info-val ${s.verified?'badge-verified':'badge-pending'}">${s.verified ? '✅ Verified' : '⏳ Pending Verification'}</span></div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-200)">
      <div style="font-weight:700;font-size:.85rem;margin-bottom:8px;color:var(--gray-700)">About</div>
      <p style="font-size:.875rem;color:var(--gray-600);line-height:1.7">${s.desc}</p>
    </div>
  `;

  // Products card
  const prodsHtml = s.products.map(p => `
    <div class="mini-product">
      <div class="mini-product-emoji">${p.emoji}</div>
      <div class="mini-product-name">${p.name}</div>
      <div class="mini-product-price">${p.price}</div>
      <div class="mini-product-moq">${p.moq}</div>
      <button class="btn-mini-inq" onclick="openInquiry(this)" data-name="${p.name.replace(/"/g,'&quot;')}">Send Inquiry</button>
    </div>
  `).join('');
  document.getElementById('cardProducts').innerHTML = `
    <h3>Products Listed (${s.products.length})</h3>
    <div class="products-list">${prodsHtml}</div>
  `;

  // Sidebar
  document.getElementById('sidebarCard').innerHTML = `
    <h4>Contact Supplier</h4>
    <div class="contact-btn-stack">
      <button class="btn-contact-full green" onclick="openInquiry(this)" data-name="${s.name.replace(/"/g,'&quot;')}">📩 Send Inquiry</button>
      <a href="https://wa.me/${s.wa}" target="_blank" class="btn-contact-full wa">💬 Chat on WhatsApp</a>
      <button class="btn-contact-full outline" onclick="saveSupplier()">❤️ Save Supplier</button>
    </div>
    <div class="stat-pill-row">
      <div class="stat-pill"><span class="stat-pill-label">Category</span><span class="stat-pill-val">${s.category}</span></div>
      <div class="stat-pill"><span class="stat-pill-label">Location</span><span class="stat-pill-val">${s.location}</span></div>
      <div class="stat-pill"><span class="stat-pill-label">MOQ</span><span class="stat-pill-val">${s.moq}</span></div>
      <div class="stat-pill"><span class="stat-pill-label">Status</span><span class="stat-pill-val ${s.verified?'badge-verified':'badge-pending'}">${s.verified?'Verified':'Pending'}</span></div>
      <div class="stat-pill"><span class="stat-pill-label">Products</span><span class="stat-pill-val">${s.products.length} listed</span></div>
    </div>
  `;
}

function openInquiry(el) {
  const name = typeof el === 'string' ? el : el.getAttribute('data-name');
  inqTarget = name;
  document.getElementById('inqTarget').textContent = name;
  document.getElementById('inqModal').classList.add('show');
}
function closeInquiry() { document.getElementById('inqModal').classList.remove('show'); }
function submitInquiry() {
  const name = document.getElementById('inqName').value.trim();
  const phone = document.getElementById('inqPhone').value.trim();
  const qty = document.getElementById('inqQty').value.trim();
  if (!name || !phone || !qty) { showToast('Please fill all required fields.','error'); return; }
  closeInquiry();
  showToast(`Inquiry sent! ${currentSupplier?.name} will contact you soon.`,'success');
}
function saveSupplier() {
  const session = JSON.parse(localStorage.getItem('th_session')||'null');
  if (!session) { showToast('Please login to save suppliers.','error'); return; }
  showToast(`${currentSupplier?.name} saved to your account!`,'success');
}
function showToast(msg, type='success') {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(()=>t.remove(),3100);
}

document.addEventListener('DOMContentLoaded', () => {
  const id = getIdFromUrl();
  currentSupplier = ALL_SUPPLIERS.find(s=>s.id===id) || ALL_SUPPLIERS[0];
  renderPage(currentSupplier);
  document.getElementById('inqModal').addEventListener('click',function(e){ if(e.target===this)closeInquiry(); });
});
</script>
<script src="../js/nav.js"></script>
</body>
</html>
